data:
  image_dir: "../USA_segmentation/RGB_images"
  mask_dir: "../USA_segmentation/masks"
  unet_pred_dir: "outputs/predictions/unet"
  maskrcnn_pred_dir: "../USA_segmentation/maskrcnn_predicted_masks"
  img_height: 224
  img_width: 224
  img_channels: 3
  test_size: 0.3
  val_size: 0.5
  random_state: 42

model:
  unet_path: "outputs/best_unet_model.keras"
  threshold: 0.5
  backbone: "EfficientNetB0"

training:
  batch_size: 16
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  patience_lr: 5
  patience_stop: 15
  dice_weight: 0.5
  focal_weight: 0.5

augmentation:
  horizontal_flip: true
  vertical_flip: true
  rotate_limit: 30
  elastic_transform: true
  grid_distortion: true
  gauss_noise: true
  clahe: true
  coarse_dropout: true
  tta: true
